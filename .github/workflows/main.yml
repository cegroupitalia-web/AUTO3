name: Applica Watermark

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Pillow
        run: pip install Pillow

      - name: Esegui Script
        run: python watermark.py

      - name: Salva modifiche in AUTO3
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add AUTO3/
          git commit -m "Watermark applicato e file sovrascritti" || echo "Nessuna modifica"
          git push
