name: Applica Watermark

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Scarica tutta la cronologia per evitare conflitti

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Pillow
        run: pip install Pillow

      - name: Esegui Script Watermark
        run: python watermark.py

      - name: Salva i cambiamenti
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Watermark applicato a tutti i prodotti" || echo "Nessuna modifica"
          # Sincronizza con il server prima di caricare
          git pull --rebase origin main
          # Carica tutto forzatamente
          git push --force origin main
