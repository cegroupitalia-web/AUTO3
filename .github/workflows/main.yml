name: Applica Watermark
on: [workflow_dispatch] # Si attiva quando clicchi tu il tasto

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install Pillow
      - run: python watermark.py
      - name: Salva Foto
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add AUTO3_PRONTE/
          git commit -m "Watermark applicato"
          git push
