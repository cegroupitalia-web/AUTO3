name: Applica Watermark

on:
  workflow_dispatch: # Questo permette di avviarlo a mano

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Pillow
        run: pip install Pillow

      - name: Esegui Script Watermark
        run: python watermark.py

      - name: Salva le foto modificate
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add AUTO3_PRONTE/
          git commit -m "Watermark applicato con successo" || echo "Nessuna modifica da caricare"
          git push
