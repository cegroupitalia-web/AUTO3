name: WATERMARK DEBUG FINAL

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watermark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: DEBUG 1 - show folder
        run: |
          echo "=== ROOT STRUCTURE ==="
          ls -R

      - name: DEBUG 2 - find images
        run: |
          echo "=== SEARCHING IMAGES ==="
          find ./AUTO3 -type f -iname "*.jpg" -print

      - name: APPLY WATERMARK (TEST)
        run: |
          echo "=== APPLYING ==="

          find ./AUTO3 -type f -iname "01.jpg" | while read img; do
            echo "FOUND IMAGE: $img"

            magick "$img" \
              -gravity southeast \
              -fill red \
              -pointsize 60 \
              -annotate +10+10 "TEST_OK" \
              "$img"

            echo "DONE: $img"
          done

      - name: VERIFY CHANGE
        run: |
          echo "=== CHECK IF FILES CHANGED ==="
          git status
          git diff --cached --quiet && echo "NO CHANGES" && exit 0

          git commit -m "watermark fixed"
          git push
