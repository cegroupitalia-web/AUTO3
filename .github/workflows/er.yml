name: WATERMARK PROOF

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watermark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: FORCE visible watermark
        run: |
          find "AUTO3" -type f -iname "01.jpg" | while read img; do
            echo "PROCESSING: $img"

            magick "$img" \
              -gravity center \
              -fill "rgba(255,0,0,0.7)" \
              -stroke black \
              -strokewidth 3 \
              -pointsize 80 \
              -annotate 0 "WATERMARK TEST" \
              "$img"

            echo "DONE: $img"
          done

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "FORCED watermark test"
          git push
