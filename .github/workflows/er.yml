name: Watermark Debug

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watermark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: FULL DEBUG STRUCTURE
        run: |
          echo "===== ROOT ====="
          pwd
          ls -R

      - name: Check MACRO folder
        run: |
          if [ ! -d "MACRO" ]; then
            echo "❌ MACRO FOLDER NOT FOUND"
            exit 1
          fi

      - name: Check logo file
        run: |
          if [ ! -f "MACRO/assetslogo.png" ]; then
            echo "❌ LOGO NOT FOUND IN MACRO/assetslogo.png"
            exit 1
          fi

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Process images
        run: |
          cd MACRO

          COUNT=$(find . -type f -iname "*.jpg" | wc -l)
          echo "IMAGES FOUND: $COUNT"

          if [ "$COUNT" -eq 0 ]; then
            echo "❌ NO IMAGES FOUND"
            exit 1
          fi

          find . -type f -iname "*.jpg" | while read img; do
            echo "Processing $img"

            magick "$img" assetslogo.png \
              -gravity southeast \
              -geometry +15+15 \
              -composite "$img"
          done

      - name: Commit
        run: |
          cd MACRO

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A

          git diff --cached --quiet && echo "NO CHANGES" && exit 0

          git commit -m "watermark debug"
          git push
