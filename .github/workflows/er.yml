name: Watermark Images

on:
  workflow_dispatch:

jobs:
  watermark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Apply watermark to all images
        run: |
          find . -type f \( -iname "*.jpg" -o -iname "*.png" \) | while read img; do
            convert "$img" assets/logo.png \
              -gravity southeast \
              -geometry +12+12 \
              -composite "$img"
          done

      - name: Commit changes safely
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Add watermark to images"
          git push
