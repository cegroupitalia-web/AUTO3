name: Watermark Images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watermark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show repo structure (DEBUG)
        run: |
          echo "=== FULL STRUCTURE ==="
          ls -R

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Run watermark
        run: |
          cd MACRO || (echo "MACRO NOT FOUND" && exit 1)

          LOGO="../assetslogo.png"

          if [ ! -f "$LOGO" ]; then
            echo "LOGO NOT FOUND: $LOGO"
            exit 1
          fi

          FILES=$(find . -type f -iname "*.jpg")

          if [ -z "$FILES" ]; then
            echo "NO IMAGES FOUND"
            exit 1
          fi

          echo "$FILES" | while read img; do
            echo "Processing $img"

            magick "$img" "$LOGO" \
              -gravity southeast \
              -geometry +15+15 \
              -composite "$img" || echo "FAILED $img"
          done

      - name: Commit
        run: |
          cd MACRO

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A

          git diff --cached --quiet && echo "NO CHANGES" && exit 0

          git commit -m "watermark applied"
          git push
