name: Watermark ONLY 01

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watermark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Watermark 01 only
        run: |
          find "./AUTO3" -type f -iname "01.jpg" | while read img; do
            echo "Processing: $img"

            magick "$img" \
              -gravity southeast \
              -fill "red" \
              -pointsize 50 \
              -annotate +10+10 "TEST" \
              "$img"
          done

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A
          git diff --cached --quiet && exit 0

          git commit -m "watermark 01 only"
          git push
