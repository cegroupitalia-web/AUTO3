name: WATERMARK FINAL STABLE

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watermark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: APPLY WATERMARK SAFE MODE
        run: |
          find "AUTO3" -type f -iname "01.jpg" | while read img; do
            echo "PROCESSING: $img"

            OUT="${img%.jpg}_wm.jpg"

            magick "$img" \
              -gravity center \
              -fill "rgba(255,0,0,0.7)" \
              -stroke black \
              -strokewidth 4 \
              -pointsize 90 \
              -annotate 0 "WATERMARK TEST" \
              "$OUT"

            mv "$OUT" "$img"
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A

          git diff --cached --quiet && echo "NO CHANGES" && exit 0

          git commit -m "FINAL watermark fix"
          git push
