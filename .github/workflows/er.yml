name: Watermark Images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watermark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Apply watermark
        run: |
          cd MACRO

          echo "Logo check:"
          ls assets/logo.png || exit 1

          find . -type f \( -iname "*.jpg" -o -iname "*.png" \) | while read img; do
            echo "Processing: $img"

            convert "$img" assets/logo.png \
              -gravity southeast \
              -geometry +15+15 \
              -composite "$img" || echo "FAILED: $img"
          done

      - name: Commit changes
        run: |
          cd MACRO

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Add watermark to images"
          git push
