name: Watermark Images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watermark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug structure
        run: |
          echo "=== ROOT ==="
          ls -R

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Apply watermark (debug)
        run: |
          echo "=== CHECK LOGO ==="
          find . -name "logo.png"

          echo "=== FIND IMAGES ==="
          find . -type f -iname "*.jpg"

          find . -type f -iname "*.jpg" | while read img; do
            echo "Processing: $img"

            convert "$img" assets/logo.png \
              -gravity southeast \
              -geometry +15+15 \
              -composite "$img" || echo "FAILED: $img"
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A

          git diff --cached --quiet && echo "NO CHANGES" && exit 0

          git commit -m "watermark debug"
          git push
