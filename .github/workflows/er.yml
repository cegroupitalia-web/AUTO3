name: Watermark Images

on:
  workflow_dispatch:

jobs:
  watermark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Apply watermark
        run: |
          find . -type f \( -iname "*.jpg" -o -iname "*.png" \) | while read img; do
            magick "$img" assets/logo.png \
              -gravity southeast \
              -geometry +12+12 \
              -compose over \
              -composite "$img"
          done

      - name: Commit safely
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Add watermark to images"
          git push
