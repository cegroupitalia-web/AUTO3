name: Watermark Images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watermark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Debug files
        run: |
          echo "=== ROOT ==="
          ls -R

      - name: Apply watermark safely
        run: |
          cd MACRO

          LOGO="../assetslogo.png"

          if [ ! -f "$LOGO" ]; then
            echo "LOGO NOT FOUND"
            exit 1
          fi

          find . -type f -iname "*.jpg" | while read img; do
            echo "Processing: $img"

            convert "$img" "$LOGO" \
              -gravity southeast \
              -geometry +15+15 \
              -composite "$img" || echo "FAILED: $img"
          done

      - name: Commit changes
        run: |
          cd MACRO

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "NO CHANGES"
            exit 0
          fi

          git commit -m "watermark applied"
          git push
