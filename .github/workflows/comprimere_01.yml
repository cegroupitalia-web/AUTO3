name: ComprimeFoto01

on:
  workflow_dispatch:

jobs:
  compression_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Pillow
        run: pip install Pillow

      - name: Esegui Script Compressione
        run: python compress_01.py

      - name: Commit e Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Compressione immagini 01 eseguita" || exit 0
          git fetch origin main
          git pull --rebase origin main
          git push origin main
