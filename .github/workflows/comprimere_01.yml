import os
from PIL import Image

def compressione_50_percento():
    target_dir = os.path.join(os.getcwd(), "AUTO3")
    
    if not os.path.exists(target_dir):
        print(f"Errore: La cartella {target_dir} non esiste!")
        return

    count = 0
    for root, dirs, files in os.walk(target_dir):
        for file in files:
            nome, est = os.path.splitext(file)
            
            # Colpiamo solo i file "01"
            if nome == "01" and est.lower() in ('.jpg', '.jpeg', '.png', '.webp'):
                path_completo = os.path.join(root, file)
                
                try:
                    with Image.open(path_completo) as img:
                        # Convertiamo in RGB per risparmiare spazio rispetto a RGBA
                        if img.mode in ("RGBA", "P"):
                            img = img.convert("RGB")
                        
                        # --- RIDUZIONE DEL 50% ---
                        nuova_larghezza = int(img.width * 0.50)
                        nuova_altezza = int(img.height * 0.50)
                        img = img.resize((nuova_larghezza, nuova_altezza), Image.Resampling.LANCZOS)
                        
                        # Salvataggio con qualità 40 (molto compressa)
                        img.save(path_completo, "JPEG", quality=40, optimize=True, progressive=True)
                        
                        print(f"DIMEZZATA: {path_completo} ({nuova_larghezza}x{nuova_altezza})")
                        count += 1
                except Exception as e:
                    print(f"Errore su {file}: {e}")

    print(f"\n--- FINE --- {count} immagini ridotte del 50%.")

if __name__ == "__main__":
    compressione_50_percento()
