name: Comprimi Immagini 01

on:
  workflow_dispatch: # Ti permette di farla partire a mano quando vuoi

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Obbligatorio per salvare le foto

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Pillow
        run: pip install Pillow

      - name: Esegui Compressione
        run: python compress_01.py

      - name: Commit e Push delle modifiche
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Compressione automatica immagini 01" || exit 0
          git push
